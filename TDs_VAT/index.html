<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAT — Validation et Tests</title>
    <link rel="stylesheet" href="./layouts/sidebar-iframe.css">
    <style>
        /* ── Toolbar flottant en haut à droite du panel contenu ── */
        .content-toolbar {
            position: absolute;
            top: 18px;
            right: 24px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        /* Annuler le position:absolute hérité de sidebar-iframe.css
           pour que le bouton reste dans le flux flex du toolbar */
        .content-toolbar .floating-toggle-btn {
            position: static;
        }

        /* Bouton secondaire (effacer, export) — moins proéminent */
        .toolbar-btn-secondary {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 8px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-secondary, #9e9a94);
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            backdrop-filter: blur(12px);
        }
        .toolbar-btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary, #f5f3f0);
            border-color: rgba(255,255,255,0.22);
        }
        .toolbar-btn-secondary.danger:hover {
            background: rgba(248,113,113,0.12);
            border-color: rgba(248,113,113,0.3);
            color: #fca5a5;
        }
        .toolbar-btn-secondary.done {
            background: rgba(110,231,183,0.12);
            border-color: rgba(110,231,183,0.3);
            color: #6ee7b7;
        }
        .toolbar-btn-secondary.done:hover {
            background: rgba(110,231,183,0.18);
            border-color: rgba(110,231,183,0.4);
        }

        /* Chronomètre */
        .timer-display {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 8px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-secondary, #9e9a94);
            font-variant-numeric: tabular-nums;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            backdrop-filter: blur(12px);
            transition: all 0.2s;
            user-select: none;
        }
        .timer-display:hover { background: rgba(255,255,255,0.08); }
        .timer-display.running { color: #6ee7b7; border-color: rgba(52,211,153,0.25); }
        .timer-display.running .timer-dot { background: #6ee7b7; animation: blink 1s ease-in-out infinite; }
        .timer-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-secondary, #9e9a94); }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* Badge "Sauvegardé" */
        .save-badge {
            font-size: 0.72rem;
            color: rgba(52,211,153,0.6);
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
            white-space: nowrap;
        }
        .save-badge.visible { opacity: 1; }

        /* Progress dot sur les boutons de navigation */
        .nav-btn.nav-done::after {
            content: '';
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            background: #6ee7b7;
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(52,211,153,0.6);
        }

        /* ── Panneau fiche récap ── */
        .fiche-panel {
            position: absolute;
            top: 56px; right: 24px;
            z-index: 300;
            width: 270px;
            padding: 1rem 1.1rem 1.1rem;
            border-radius: 16px;
            display: none;
            flex-direction: column;
            gap: 0.5rem;
        }
        .fiche-panel.visible { display: flex; }

        @media (max-width: 768px) {
            .fiche-panel { position: fixed; width: 100%; border-radius: 20px 20px 0 0; bottom: 72px; top: auto; right: 0; left: 0; z-index: 300; box-sizing: border-box; }
        }

        .fiche-panel-header {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.85rem; font-weight: 700; color: var(--text-primary);
            margin-bottom: 0.25rem;
        }
        .fiche-panel-close {
            background: none; border: none; color: var(--text-secondary);
            font-size: 0.9rem; cursor: pointer; padding: 2px 6px; border-radius: 6px;
            font-family: inherit;
        }
        .fiche-panel-close:hover { background: rgba(255,255,255,0.08); }

        .fiche-panel-section-label {
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1.5px; color: var(--text-secondary);
            margin: 0.25rem 0 0.2rem;
        }

        .fiche-presets {
            display: flex; gap: 0.4rem; flex-wrap: wrap;
        }
        .fiche-presets button {
            flex: 1; padding: 5px 8px; font-size: 0.78rem; font-weight: 600;
            font-family: inherit; cursor: pointer; border-radius: 8px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            color: var(--text-secondary);
            transition: all 0.15s;
        }
        .fiche-presets button:hover { background: rgba(255,255,255,0.13); color: var(--text-primary); }
        .fiche-presets button.active { background: rgba(249,115,22,0.2); border-color: rgba(249,115,22,0.4); color: #fff7ed; }

        .fiche-checks {
            display: flex; flex-direction: column; gap: 0.3rem;
        }
        .fiche-checks label {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.82rem; color: var(--text-secondary);
            cursor: pointer; padding: 2px 0;
        }
        .fiche-checks label:hover { color: var(--text-primary); }
        .fiche-checks input[type="checkbox"] {
            width: 14px; height: 14px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0;
        }
        .fiche-divider {
            border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 0.2rem 0;
        }

        .fiche-generate-btn {
            margin-top: 0.4rem; padding: 9px 0; width: 100%;
            font-size: 0.85rem; font-weight: 700; font-family: inherit;
            cursor: pointer; border-radius: 10px;
            background: linear-gradient(160deg, rgba(249,115,22,0.28), rgba(249,115,22,0.12));
            border: 1px solid rgba(249,115,22,0.4);
            color: #fff7ed;
            transition: all 0.2s;
        }
        .fiche-generate-btn:hover { background: linear-gradient(160deg, rgba(249,115,22,0.38), rgba(249,115,22,0.2)); }

        /* ── Responsive mobile (≤ 768px) ── */
        @media (max-width: 768px) {
            /* Toolbar devient un strip en haut du contenu (pas position absolute) */
            .content-toolbar {
                position: relative;
                top: auto; right: auto;
                width: 100%;
                box-sizing: border-box;
                padding: 0.5rem 0.75rem;
                border-bottom: 1px solid rgba(255,255,255,0.08);
                background: rgba(38,38,36,0.6);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                flex-shrink: 0;
                flex-wrap: wrap;
                row-gap: 0.4rem;
                border-radius: var(--radius-lg, 24px) var(--radius-lg, 24px) 0 0;
            }

            /* Boutons secondaires compacts */
            .toolbar-btn-secondary {
                padding: 6px 10px;
                font-size: 0.78rem;
            }

            /* Timer compact */
            .timer-display {
                padding: 6px 10px;
                font-size: 0.78rem;
            }

            /* Solutions toggle compact (texte court injecté par JS) */
            .floating-toggle-btn {
                padding: 6px 12px;
                font-size: 0.78rem;
                border-radius: 14px;
            }

            /* Save badge masqué (économie d'espace) */
            .save-badge { display: none; }

            /* L'iframe prend tout l'espace restant dans content-wrapper flex-column */
            #content-frame {
                flex: 1;
                min-height: 0;
            }
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="cursor-halo" id="cursor-halo"></div>

    <div class="app-container">
        <nav class="sidebar glass-panel">
            <div class="sidebar-header">
                <h1>VAT</h1>
                <p>Validation et Tests</p>
            </div>
            <div class="nav-links" id="nav-links">
                <button class="nav-btn" onclick="loadSection('section-td-petri.html', this)">Réseaux de Petri</button>
                <button class="nav-btn" onclick="loadSection('section-td1-wcet.html', this)">TD1 — WCET</button>
                <button class="nav-btn" onclick="loadSection('section-td2-viabilite.html', this)">TD2 — Viabilité</button>
                <button class="nav-btn" onclick="loadSection('section-td3-ftp.html', this)">TD3 — FTP</button>
                <button class="nav-btn" onclick="loadSection('section-td4-rta.html', this)">TD4 — RTA</button>
                <button class="nav-btn" onclick="loadSection('section-td5-rta-dep.html', this)">TD5 — RTA Dépendante</button>
                <button class="nav-btn" onclick="loadSection('section-td-flottant-complexite.html', this)">TD Flottant — Complexité</button>
                <div style="margin: 1rem 0; border-top: 1px solid rgba(255,255,255,0.1);"></div>
                <button class="nav-btn" onclick="loadSection('section-EXAMPLE.html', this)">Composants</button>
            </div>
        </nav>

        <main class="main-content">
            <div class="glass-panel content-wrapper">

                <!-- Toolbar flottant — visible sur le contenu, pas dans la sidebar -->
                <div class="content-toolbar">
                    <!-- Chronomètre — clic pour démarrer/pauser, double-clic pour reset -->
                    <div class="timer-display" id="timer" onclick="toggleTimer()" ondblclick="resetTimer()" title="Clic : démarrer/pauser · Double-clic : reset">
                        <span class="timer-dot"></span>
                        <span id="timer-text">00:00</span>
                    </div>

                    <span class="save-badge" id="save-badge">✓ sauvegardé</span>

                    <!-- Effacer les réponses -->
                    <button class="toolbar-btn-secondary danger" onclick="clearAnswers()" title="Effacer toutes les réponses de cet exercice">
                        ✕ Effacer
                    </button>

                    <!-- Valider l'exercice -->
                    <button class="toolbar-btn-secondary" id="validate-btn" onclick="validateCurrentSection()" title="Marquer cet exercice comme terminé">
                        ✓ Valider
                    </button>

                    <!-- Export des notes -->
                    <button class="toolbar-btn-secondary" onclick="exportAnswers()" title="Télécharger mes réponses en texte brut">
                        ↓ Export
                    </button>

                    <!-- Fiche récap imprimable -->
                    <button class="toolbar-btn-secondary" id="fiche-btn" onclick="toggleFichePanel()" title="Générer une fiche récap imprimable A4 portrait">
                        ⎙ Fiche
                    </button>

                    <!-- Révéler toutes les solutions -->
                    <button class="floating-toggle-btn" id="solutions-toggle" onclick="toggleAllSolutions()">
                        ▶ Révéler toutes les solutions
                    </button>
                </div>

                <!-- Panneau de filtres fiche récap -->
                <div class="fiche-panel glass-panel" id="fiche-panel" role="dialog" aria-label="Options de la fiche récap">
                    <div class="fiche-panel-header">
                        <span>⎙ Fiche récap</span>
                        <button class="fiche-panel-close" onclick="toggleFichePanel()" aria-label="Fermer">✕</button>
                    </div>

                    <p class="fiche-panel-section-label">Presets rapides</p>
                    <div class="fiche-presets">
                        <button onclick="applyPreset('all')">Tout</button>
                        <button onclick="applyPreset('revision')">Révision</button>
                        <button onclick="applyPreset('entrainement')">Entraînement</button>
                    </div>

                    <p class="fiche-panel-section-label">Contenu à inclure</p>
                    <div class="fiche-checks">
                        <label><input type="checkbox" id="f-objectifs" checked> Objectifs</label>
                        <label><input type="checkbox" id="f-ctx"       checked> Contexte</label>
                        <label><input type="checkbox" id="f-rappel"    checked> Rappels de cours</label>
                        <label><input type="checkbox" id="f-exemple"   checked> Exemples guidés</label>
                        <hr class="fiche-divider">
                        <label><input type="checkbox" id="f-question"  checked> Énoncés des questions</label>
                        <label><input type="checkbox" id="f-solution"  checked> Solutions</label>
                        <hr class="fiche-divider">
                        <label><input type="checkbox" id="f-erreur"    checked> Erreurs fréquentes</label>
                        <label><input type="checkbox" id="f-tip"       checked> Points clés &amp; Tips</label>
                        <label><input type="checkbox" id="f-callout"   checked> Infos &amp; Analogies</label>
                        <label><input type="checkbox" id="f-methode"   checked> Méthodes</label>
                    </div>

                    <p class="fiche-panel-section-label">Mode couleur</p>
                    <div class="fiche-presets">
                        <button class="color-mode-btn active" onclick="selectColorMode('neutre', this)">Neutre</button>
                        <button class="color-mode-btn" onclick="selectColorMode('sobre', this)">Sobre</button>
                        <button class="color-mode-btn" onclick="selectColorMode('couleur', this)">Couleur</button>
                    </div>

                    <button class="fiche-generate-btn" onclick="generateFromPanel()">⎙ Générer la fiche</button>
                </div>

                <iframe id="content-frame" src="" frameborder="0"></iframe>
            </div>
        </main>
    </div>

    <script src="./print-utils.js" defer></script>
    <script>
        // ── Halo curseur ──────────────────────────────────────────────────
        const halo = document.getElementById('cursor-halo');
        function moveHalo(x, y) { halo.style.left = x + 'px'; halo.style.top = y + 'px'; }
        document.addEventListener('mousemove', (e) => moveHalo(e.clientX, e.clientY));
        function attachIframeHalo(frame) {
            try {
                frame.contentWindow.document.addEventListener('mousemove', (e) => {
                    const r = frame.getBoundingClientRect();
                    moveHalo(r.left + e.clientX, r.top + e.clientY);
                });
            } catch(e) {}
        }

        // ── Navigation et persistance ─────────────────────────────────────
        let solutionsRevealed = false;

        window.onload = () => {
            const buttons = document.querySelectorAll('.nav-btn');
            if (!buttons.length) return;

            const saved   = localStorage.getItem('td_currentSection');
            const first   = buttons[0].getAttribute('onclick')?.match(/'([^']+)'/)?.[1] || '';
            const savedOk = saved && [...buttons].some(b => b.getAttribute('onclick')?.includes(saved));
            const target  = savedOk ? saved : first;

            if (target) loadSection(target, null);
            buttons.forEach(b => {
                if (b.getAttribute('onclick')?.includes(target)) b.classList.add('active');
            });

            // Restaurer les indicateurs de progression
            restoreProgressDots();
        };

        function loadSection(url, button) {
            const frame = document.getElementById('content-frame');
            frame.style.opacity = 0;
            localStorage.setItem('td_currentSection', url);

            // Réinitialiser le toggle quand on change d'exercice
            solutionsRevealed = false;
            updateToggleBtn();

            // Mettre à jour le bouton de validation
            updateValidateBtn(localStorage.getItem('td_done_' + url));

            setTimeout(() => {
                frame.src = url;
                frame.onload = () => {
                    frame.style.opacity = 1;
                    attachIframeHalo(frame);
                    // Restaurer position de scroll
                    const pos = localStorage.getItem('td_scroll_' + url);
                    if (pos) frame.contentWindow.scrollTo(0, parseInt(pos));
                    frame.contentWindow.addEventListener('scroll', () => {
                        localStorage.setItem('td_scroll_' + url, frame.contentWindow.scrollY);
                    }, { passive: true });
                };
            }, 280);

            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if (button) button.classList.add('active');
        }

        // ── Révéler / Masquer toutes les solutions ────────────────────────
        function toggleAllSolutions() {
            solutionsRevealed = !solutionsRevealed;
            updateToggleBtn();
            sendToFrame(solutionsRevealed ? 'show-all-solutions' : 'hide-all-solutions');
        }

        function updateToggleBtn() {
            const btn = document.getElementById('solutions-toggle');
            const mobile = window.innerWidth <= 768;
            btn.innerHTML = solutionsRevealed
                ? (mobile ? '▼ Masquer' : '▼ Masquer les solutions')
                : (mobile ? '▶ Solutions' : '▶ Révéler toutes les solutions');
        }

        window.addEventListener('resize', updateToggleBtn);

        // ── Effacer les réponses (avec confirmation) ──────────────────────
        function clearAnswers() {
            if (!confirm('Effacer toutes vos réponses pour cet exercice ?\nCette action est irréversible.')) return;
            sendToFrame('clear-answers');
        }

        // ── Export des notes en texte ─────────────────────────────────────
        function exportAnswers() {
            sendToFrame('export-answers');
        }

        function sendToFrame(msg) {
            const frame = document.getElementById('content-frame');
            try { frame.contentWindow.postMessage(msg, '*'); } catch(e) {}
        }

        // ── Chronomètre ───────────────────────────────────────────────────
        let timerInterval = null;
        let timerSeconds  = 0;
        let timerRunning  = false;

        function toggleTimer() {
            const display = document.getElementById('timer');
            if (timerRunning) {
                clearInterval(timerInterval);
                timerRunning = false;
                display.classList.remove('running');
            } else {
                timerInterval = setInterval(() => {
                    timerSeconds++;
                    const m = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
                    const s = String(timerSeconds % 60).padStart(2, '0');
                    document.getElementById('timer-text').textContent = m + ':' + s;
                }, 1000);
                timerRunning = true;
                display.classList.add('running');
            }
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerRunning  = false;
            timerSeconds  = 0;
            document.getElementById('timer-text').textContent = '00:00';
            document.getElementById('timer').classList.remove('running');
        }

        // ── Badge "sauvegardé" ────────────────────────────────────────────
        let saveBadgeTimeout = null;
        function showSaveBadge() {
            const badge = document.getElementById('save-badge');
            badge.classList.add('visible');
            clearTimeout(saveBadgeTimeout);
            saveBadgeTimeout = setTimeout(() => badge.classList.remove('visible'), 2000);
        }

        // ── Messages entrants depuis l'iframe ────────────────────────────
        window.addEventListener('message', (e) => {
            if (e.data?.type === 'answer-saved') {
                showSaveBadge();
            }
            if (e.data?.type === 'export-data') {
                downloadAnswers(e.data.text);
            }
        });

        // ── Validation manuelle ────────────────────────────
        function validateCurrentSection() {
            const sectionUrl = localStorage.getItem('td_currentSection') || '';
            const isDone = localStorage.getItem('td_done_' + sectionUrl);

            if (isDone) {
                // S'il est déjà validé, on donne la possibilité de l'invalider
                localStorage.removeItem('td_done_' + sectionUrl);
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    const url = btn.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
                    if (url === sectionUrl) btn.classList.remove('nav-done');
                });
                updateValidateBtn(false);
            } else {
                markDone(sectionUrl);
            }
        }

        function markDone(sectionUrl) {
            if (!sectionUrl) return;
            localStorage.setItem('td_done_' + sectionUrl, '1');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                const url = btn.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
                if (url === sectionUrl) btn.classList.add('nav-done');
            });
            updateValidateBtn(true);
        }

        function updateValidateBtn(isDone) {
            const btn = document.getElementById('validate-btn');
            if (btn) {
                if (isDone) {
                    btn.classList.add('done');
                    btn.innerHTML = '✓ Validé';
                } else {
                    btn.classList.remove('done');
                    btn.innerHTML = '✓ Valider';
                }
            }
        }

        function downloadAnswers(text) {
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');
            a.href     = url;
            a.download = 'mes-reponses.txt';
            a.click();
            URL.revokeObjectURL(url);
        }

        // ── Panneau fiche ────────────────────────────────────────────────
        const FILTER_KEYS = ['objectifs','ctx','rappel','exemple','question','solution','erreur','tip','callout','methode'];

        function toggleFichePanel() {
            const panel = document.getElementById('fiche-panel');
            panel.classList.toggle('visible');
            if (panel.classList.contains('visible')) {
                loadFilterState();
                loadColorModeState();
            }
        }

        // Fermer si clic en dehors
        document.addEventListener('click', (e) => {
            const panel = document.getElementById('fiche-panel');
            const btn   = document.getElementById('fiche-btn');
            if (panel?.classList.contains('visible') && !panel.contains(e.target) && e.target !== btn) {
                panel.classList.remove('visible');
            }
        });

        function loadFilterState() {
            const saved = JSON.parse(localStorage.getItem('td_fiche_filters') || '{}');
            FILTER_KEYS.forEach(k => {
                const el = document.getElementById('f-' + k);
                if (el) el.checked = saved[k] !== false; // true par défaut
            });
        }

        function saveFilterState() {
            const filters = {};
            FILTER_KEYS.forEach(k => {
                const el = document.getElementById('f-' + k);
                if (el) filters[k] = el.checked;
            });
            localStorage.setItem('td_fiche_filters', JSON.stringify(filters));
            return filters;
        }

        function applyPreset(name) {
            const presets = {
                all:          { objectifs:true, ctx:true, rappel:true, exemple:true, question:true, solution:true, erreur:true, tip:true, callout:true, methode:true },
                revision:     { objectifs:true, ctx:false, rappel:false, exemple:false, question:true, solution:true, erreur:true, tip:true, callout:false, methode:false },
                entrainement: { objectifs:true, ctx:true, rappel:true, exemple:true, question:true, solution:false, erreur:false, tip:false, callout:false, methode:false },
            };
            const p = presets[name] || presets.all;
            FILTER_KEYS.forEach(k => {
                const el = document.getElementById('f-' + k);
                if (el) el.checked = !!p[k];
            });
            document.querySelectorAll('.fiche-presets button').forEach(b => b.classList.remove('active'));
            document.querySelector(`.fiche-presets button[onclick="applyPreset('${name}')"]`)?.classList.add('active');
        }

        let selectedColorMode = localStorage.getItem('td_fiche_colorMode') || 'neutre';

        function selectColorMode(mode, btn) {
            selectedColorMode = mode;
            localStorage.setItem('td_fiche_colorMode', mode);
            document.querySelectorAll('.color-mode-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
        }

        function loadColorModeState() {
            const mode = localStorage.getItem('td_fiche_colorMode') || 'neutre';
            selectedColorMode = mode;
            document.querySelectorAll('.color-mode-btn').forEach(b => {
                b.classList.toggle('active', b.textContent.trim().toLowerCase() === mode);
            });
        }

        async function generateFromPanel() {
            const filters = saveFilterState();
            document.getElementById('fiche-panel')?.classList.remove('visible');
            await generatePrintSheet(filters, selectedColorMode);
        }

        function restoreProgressDots() {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                const url = btn.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
                if (url && localStorage.getItem('td_done_' + url)) {
                    btn.classList.add('nav-done');
                }
            });
        }
    </script>
</body>
</html>
